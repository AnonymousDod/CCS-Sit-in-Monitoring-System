<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #ff726f;
            border-radius: 10px;
            padding: 20px 30px;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .signup-form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 14px;
            color: #fff;
            margin-bottom: 5px;
        }

        .form-group.full-width {
            flex-direction: column;
        }

        .form-group > div {
            flex: 1;
            margin-right: 10px;
        }

        .form-group > div:last-child {
            margin-right: 0;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            outline: none;
            background-color: #fff;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            background-color: #32cd32;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background-color: #28a428;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form class="signup-form" action="login.html" method="post">
            <div class="form-group full-width">
                <label for="idno">ID Number: <span>*</span></label>
                <input type="text" id="idno" name="idno" required>
            </div>
            <div class="form-group">
                <div>
                    <label for="lastname">Lastname: <span>*</span></label>
                    <input type="text" id="lastname" name="lastname" required>
                </div>
                <div>
                    <label for="firstname">Firstname: <span>*</span></label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>
            </div>
            <div class="form-group full-width">
                <label for="midname">Middle Name: <span>*</span></label>
                <input type="text" id="midname" name="midname" required>
            </div>
            <div class="form-group">
                <div>
                    <label for="course">Course: <span>*</span></label>
                    <input type="text" id="course" name="course" required>
                </div>
                <div>
                    <label for="yearlevel">Year Level: <span>*</span></label>
                    <select id="yearlevel" name="yearlevel" required>
                        <option value="">Select Year Level</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
            </div>
            <div class="form-group full-width">
                <label for="email">Email: <span>*</span></label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group full-width">
                <label for="username">Username: <span>*</span></label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group full-width">
                <label for="password">Password: <span>*</span></label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">SIGN UP</button>
        </form>
    </div>
</body>
</html>
